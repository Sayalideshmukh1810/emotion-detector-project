<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function runAnalysis() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            let xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("system_response").innerHTML = this.responseText;
                }
            };
            xhttp.open("GET", "emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze), true);
            xhttp.send();
        }
    </script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
            <h2 class="text-center mb-4 text-primary">Emotion Detector</h2>
            <div class="mb-3">
                <label for="textToAnalyze" class="form-label">Enter text for analysis:</label>
                <input type="text" class="form-control" id="textToAnalyze" placeholder="Type something...">
            </div>
            <button class="btn btn-primary w-100" onclick="runAnalysis()">Analyze</button>
            <div class="mt-4 p-3 bg-white border rounded text-secondary" id="system_response">
                System response will appear here...
            </div>
        </div>
    </div>
</body>
</html>
